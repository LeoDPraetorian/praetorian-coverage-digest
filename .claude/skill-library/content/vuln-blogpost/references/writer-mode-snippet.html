<script>
  // ========================================
  // WRITER MODE ENGINE
  // ========================================

  const STORE_KEY = 'praet-writer-' + document.title.replace(/[^a-z0-9]/gi, '-').substring(0, 40);
  let writerSections = [];
  let currentStep = 0;
  let timerInterval = null;
  let timerSeconds = 0;
  let writerActive = false;

  // --- Data Extraction from Pitch Mode DOM ---
  function extractSections() {
    const sections = [];

    // Find the Blog Structure section
    const allSections = document.querySelectorAll('#pitch-mode .section');
    let blogStructureSection = null;

    allSections.forEach(sec => {
      const title = sec.querySelector('.section-title');
      if (title && title.textContent.includes('Blog Structure')) {
        blogStructureSection = sec;
      }
    });

    if (!blogStructureSection) return sections;

    const cards = blogStructureSection.querySelectorAll('.card');
    cards.forEach((card, i) => {
      const titleEl = card.querySelector('.card-title');
      if (!titleEl) return;

      const wordCountEl = titleEl.querySelector('.word-count');
      const tagEl = titleEl.querySelector('.structure-tag');

      // Get section title (without the tag and word count text)
      let sectionTitle = titleEl.textContent.trim();
      if (wordCountEl) sectionTitle = sectionTitle.replace(wordCountEl.textContent, '').trim();
      if (tagEl) sectionTitle = sectionTitle.replace(tagEl.textContent, '').trim();

      const wordTarget = wordCountEl ? wordCountEl.textContent.trim() : '200-300 words';
      const tag = tagEl ? tagEl.textContent.trim() : 'H2';

      // Extract content direction
      const directionEl = card.querySelector('.content-direction');
      let direction = '';
      if (directionEl) {
        const items = directionEl.querySelectorAll('li');
        if (items.length > 0) {
          direction = Array.from(items).map(li => li.textContent.trim()).join('\n');
        } else {
          const p = directionEl.querySelector('p');
          if (p) direction = p.textContent.trim();
        }
      }

      // Extract voice note
      const voiceEl = card.querySelector('.voice-note');
      let voice = '';
      if (voiceEl) {
        const voiceContent = voiceEl.cloneNode(true);
        const label = voiceContent.querySelector('.voice-note-label');
        if (label) label.remove();
        voice = voiceContent.textContent.trim();
      }

      // Extract engineer markers
      const markerEl = card.querySelector('.engineer-marker');
      let marker = '';
      if (markerEl) {
        const p = markerEl.querySelector('p');
        if (p) marker = p.textContent.trim();
      }

      // Parse word count range
      const match = wordTarget.match(/(\d+)\s*-\s*(\d+)/);
      const minWords = match ? parseInt(match[1]) : 150;
      const maxWords = match ? parseInt(match[2]) : 300;

      sections.push({
        index: i,
        title: sectionTitle,
        tag: tag,
        wordTarget: wordTarget,
        minWords: minWords,
        maxWords: maxWords,
        direction: direction,
        voice: voice,
        marker: marker,
        text: ''
      });
    });

    return sections;
  }

  // --- Extract metadata for markdown generation ---
  function extractMeta() {
    const meta = {};

    // Title
    const headerTitle = document.querySelector('#pitch-mode .header-title');
    meta.title = headerTitle ? headerTitle.textContent.trim() : 'Untitled Blog Post';

    // Keywords
    const keywords = document.querySelectorAll('#pitch-mode .keyword');
    meta.keywords = Array.from(keywords).map(k => k.textContent.trim());

    // Meta description
    const metaCards = document.querySelectorAll('#pitch-mode .card');
    metaCards.forEach(card => {
      const title = card.querySelector('.card-title');
      if (title && title.textContent.includes('Meta Description')) {
        const p = card.querySelector('p');
        if (p) meta.description = p.textContent.trim();
      }
      if (title && title.textContent.includes('URL Slug')) {
        const p = card.querySelector('p');
        if (p) meta.slug = p.textContent.trim();
      }
    });

    // FAQ
    const faqItems = document.querySelectorAll('#pitch-mode .faq-item');
    meta.faq = Array.from(faqItems).map(item => ({
      question: item.querySelector('.faq-question') ? item.querySelector('.faq-question').textContent.replace(/^Q\s*/, '').trim() : '',
      answer: item.querySelector('.faq-answer') ? item.querySelector('.faq-answer').textContent.trim() : ''
    }));

    return meta;
  }

  // --- UI Building ---
  function buildSidebar() {
    const container = document.getElementById('sidebar-sections');
    container.innerHTML = '';

    writerSections.forEach((sec, i) => {
      const step = document.createElement('div');
      step.className = 'sidebar-step' + (i === currentStep ? ' active' : '') + (sec.text.trim().length > 0 ? ' completed' : '');
      step.onclick = () => goToStep(i);

      const icon = document.createElement('div');
      icon.className = 'sidebar-step-icon';
      icon.textContent = sec.text.trim().length > 0 ? '\u2713' : (i + 1);

      const label = document.createElement('div');
      label.className = 'sidebar-step-label';
      // Truncate long titles for sidebar
      const shortTitle = sec.title.length > 22 ? sec.title.substring(0, 22) + '...' : sec.title;
      label.textContent = shortTitle;

      step.appendChild(icon);
      step.appendChild(label);
      container.appendChild(step);
    });
  }

  function buildWriterContent(stepIndex) {
    const sec = writerSections[stepIndex];
    const container = document.getElementById('writer-content');

    let html = '<div class="writer-section-header">';
    html += '<div class="writer-section-tag">' + sec.tag + ' &middot; Section ' + (stepIndex + 1) + ' of ' + writerSections.length + '</div>';
    html += '<div class="writer-section-title">' + escapeHtml(sec.title) + '</div>';
    html += '<div class="writer-section-meta">';
    html += '<span>Target: ' + sec.wordTarget + '</span>';
    const wc = countWords(sec.text);
    if (wc > 0) html += '<span>&middot; Current: ' + wc + ' words</span>';
    html += '</div></div>';

    // Content direction
    if (sec.direction) {
      html += '<div class="writer-ref-card direction">';
      html += '<div class="writer-ref-label">Content Direction</div>';
      html += '<ul>';
      sec.direction.split('\n').forEach(line => {
        if (line.trim()) html += '<li>' + escapeHtml(line.trim()) + '</li>';
      });
      html += '</ul></div>';
    }

    // Voice note
    if (sec.voice) {
      html += '<div class="writer-ref-card voice">';
      html += '<div class="writer-ref-label">Voice Note</div>';
      html += '<p>' + escapeHtml(sec.voice) + '</p></div>';
    }

    // Engineer marker
    if (sec.marker) {
      html += '<div class="writer-ref-card engineer">';
      html += '<div class="writer-ref-label">&#9888; Engineer To Complete</div>';
      html += '<p>' + escapeHtml(sec.marker) + '</p></div>';
    }

    // Text area
    html += '<div class="writer-textarea-wrapper">';
    html += '<div class="writer-textarea-label">Write your section below:</div>';
    html += '<textarea class="writer-textarea" id="section-textarea" placeholder="Start writing here... The content direction above is your guide. Write in your own voice."';
    html += ' oninput="onTextInput(this)">' + escapeHtml(sec.text) + '</textarea>';
    html += '</div>';

    // Word count bar
    const pct = Math.min(100, Math.round((wc / sec.maxWords) * 100));
    const wcClass = wc < sec.minWords ? 'low' : (wc <= sec.maxWords * 1.2 ? 'good' : 'over');
    html += '<div class="word-count-bar">';
    html += '<div class="word-count-display ' + wcClass + '">' + wc + ' / ' + sec.minWords + '-' + sec.maxWords + ' words</div>';
    html += '<div class="word-count-progress"><div class="word-count-fill ' + wcClass + '" style="width:' + pct + '%"></div></div>';
    html += '</div>';

    // Navigation
    html += '<div class="writer-nav">';
    if (stepIndex > 0) {
      html += '<button class="writer-nav-btn secondary" onclick="goToStep(' + (stepIndex - 1) + ')">&larr; Previous</button>';
    } else {
      html += '<div></div>';
    }
    if (stepIndex < writerSections.length - 1) {
      html += '<button class="writer-nav-btn primary" onclick="saveAndNext()">Save &amp; Next &rarr;</button>';
    } else {
      html += '<button class="writer-nav-btn finish" onclick="finishWriting()">&#127881; Finish Draft</button>';
    }
    html += '</div>';

    container.innerHTML = html;

    // Focus textarea
    setTimeout(() => {
      const ta = document.getElementById('section-textarea');
      if (ta && !sec.text) ta.focus();
    }, 100);
  }

  // --- Actions ---
  function enterWriterMode() {
    writerSections = extractSections();
    if (writerSections.length === 0) {
      alert('Could not extract blog sections from the outline. Please check the HTML structure.');
      return;
    }

    // Load saved progress
    loadProgress();

    // Hide pitch, show writer
    document.getElementById('pitch-mode').style.display = 'none';
    document.getElementById('writer-overlay').style.display = 'flex';
    document.querySelector('.start-writing-btn').style.display = 'none';
    writerActive = true;

    // Find first incomplete section or start at 0
    currentStep = writerSections.findIndex(s => !s.text.trim());
    if (currentStep === -1) currentStep = 0;

    buildSidebar();
    buildWriterContent(currentStep);
    updateWriterProgress();
    startTimer();
  }

  function exitWriterMode() {
    saveProgress();
    stopTimer();
    writerActive = false;

    document.getElementById('writer-overlay').style.display = 'none';
    document.getElementById('pitch-mode').style.display = '';
    document.querySelector('.start-writing-btn').style.display = 'flex';
  }

  function goToStep(index) {
    // Save current text first
    const ta = document.getElementById('section-textarea');
    if (ta) writerSections[currentStep].text = ta.value;

    currentStep = index;
    buildSidebar();
    buildWriterContent(currentStep);
    updateWriterProgress();
    saveProgress();

    // Scroll writer main to top
    document.querySelector('.writer-main').scrollTop = 0;
  }

  function saveAndNext() {
    const ta = document.getElementById('section-textarea');
    if (ta) writerSections[currentStep].text = ta.value;

    const hadText = writerSections[currentStep].text.trim().length > 0;

    saveProgress();

    if (hadText && currentStep < writerSections.length - 1) {
      showCelebration(writerSections[currentStep].title);
    }

    if (currentStep < writerSections.length - 1) {
      goToStep(currentStep + 1);
    }
  }

  function finishWriting() {
    const ta = document.getElementById('section-textarea');
    if (ta) writerSections[currentStep].text = ta.value;
    saveProgress();

    // Check completion
    const completed = writerSections.filter(s => s.text.trim().length > 0).length;
    const total = writerSections.length;
    const totalWords = writerSections.reduce((sum, s) => sum + countWords(s.text), 0);
    const minutes = Math.round(timerSeconds / 60);

    if (completed < total) {
      const proceed = confirm('You have ' + (total - completed) + ' empty sections. Generate draft anyway?');
      if (!proceed) return;
    }

    // Show completion overlay
    document.getElementById('completion-time').textContent = minutes + ' minutes';
    document.getElementById('completion-stats').innerHTML =
      '<div class="export-stat"><div class="export-stat-number">' + completed + '/' + total + '</div><div class="export-stat-label">Sections</div></div>' +
      '<div class="export-stat"><div class="export-stat-number">' + totalWords + '</div><div class="export-stat-label">Words</div></div>' +
      '<div class="export-stat"><div class="export-stat-number">' + minutes + '</div><div class="export-stat-label">Minutes</div></div>';
    document.getElementById('completion-overlay').style.display = 'flex';
  }

  function onTextInput(textarea) {
    writerSections[currentStep].text = textarea.value;
    const wc = countWords(textarea.value);
    const sec = writerSections[currentStep];
    const pct = Math.min(100, Math.round((wc / sec.maxWords) * 100));
    const wcClass = wc < sec.minWords ? 'low' : (wc <= sec.maxWords * 1.2 ? 'good' : 'over');

    const display = document.querySelector('.word-count-display');
    const fill = document.querySelector('.word-count-fill');
    if (display) {
      display.textContent = wc + ' / ' + sec.minWords + '-' + sec.maxWords + ' words';
      display.className = 'word-count-display ' + wcClass;
    }
    if (fill) {
      fill.style.width = pct + '%';
      fill.className = 'word-count-fill ' + wcClass;
    }

    // Debounced auto-save
    clearTimeout(window._autoSaveTimeout);
    window._autoSaveTimeout = setTimeout(() => {
      saveProgress();
      updateWriterProgress();
      buildSidebar();
      document.getElementById('autosave-status').textContent = 'Auto-saved just now';
    }, 1500);
  }

  // --- Markdown Generation ---
  function generateMarkdown() {
    const meta = extractMeta();
    let md = '';

    md += '---\n';
    md += 'title: "' + meta.title + '"\n';
    if (meta.slug) md += 'slug: ' + meta.slug + '\n';
    md += 'author: "[Your Name], [Title] at Praetorian"\n';
    md += 'date: ' + new Date().toISOString().split('T')[0] + '\n';
    md += 'category: vulnerability-research\n';
    if (meta.keywords.length) md += 'tags: [' + meta.keywords.join(', ') + ']\n';
    if (meta.description) md += 'meta_description: "' + meta.description + '"\n';
    md += '---\n\n';

    md += '# ' + meta.title + '\n\n';

    writerSections.forEach(sec => {
      md += '## ' + sec.title + '\n\n';
      if (sec.text.trim()) {
        md += sec.text.trim() + '\n\n';
      } else {
        md += '*[Section not yet written]*\n\n';
      }
    });

    // FAQ
    if (meta.faq && meta.faq.length > 0) {
      md += '---\n\n## Frequently Asked Questions\n\n';
      meta.faq.forEach(faq => {
        md += '### ' + faq.question + '\n\n';
        md += faq.answer + '\n\n';
      });
    }

    md += '---\n\n';
    md += '*[Author bio and CTA to be added by marketing]*\n';

    return md;
  }

  function showExportModal() {
    const md = generateMarkdown();
    const completed = writerSections.filter(s => s.text.trim().length > 0).length;
    const totalWords = writerSections.reduce((sum, s) => sum + countWords(s.text), 0);

    document.getElementById('export-stats').innerHTML =
      '<div class="export-stat"><div class="export-stat-number">' + completed + '/' + writerSections.length + '</div><div class="export-stat-label">Sections</div></div>' +
      '<div class="export-stat"><div class="export-stat-number">' + totalWords + '</div><div class="export-stat-label">Total Words</div></div>' +
      '<div class="export-stat"><div class="export-stat-number">' + Math.ceil(totalWords / 238) + '</div><div class="export-stat-label">Min Read</div></div>';

    document.getElementById('export-preview').textContent = md;
    document.getElementById('export-modal').style.display = 'flex';
  }
  function closeExportModal() { document.getElementById('export-modal').style.display = 'none'; }

  function downloadMarkdown() {
    const md = generateMarkdown();
    const meta = extractMeta();
    const slug = (meta.slug || 'blog-draft').replace(/^\/blog\//, '').replace(/[^a-z0-9-]/g, '-');
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = slug + '.md';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function copyMarkdown() {
    const md = generateMarkdown();
    navigator.clipboard.writeText(md).then(() => {
      const btn = event.target.closest('.export-btn');
      if (btn) {
        btn.classList.add('copied');
        const orig = btn.innerHTML;
        btn.innerHTML = '<span>&#10003;</span> Copied!';
        setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
      }
    });
  }

  // --- Celebration ---
  function showCelebration(sectionTitle) {
    const el = document.getElementById('celebration');
    document.getElementById('celebration-text').textContent = '"' + sectionTitle + '" saved';
    el.style.display = 'flex';
    setTimeout(() => { el.style.display = 'none'; }, 800);
  }

  // --- Progress ---
  function updateWriterProgress() {
    const completed = writerSections.filter(s => s.text.trim().length > 0).length;
    const total = writerSections.length;
    const pct = total ? Math.round((completed / total) * 100) : 0;

    document.getElementById('writer-progress-text').textContent = completed + ' / ' + total + ' sections';
    document.getElementById('writer-progress-fill').style.width = pct + '%';
  }

  // --- Timer ---
  function startTimer() {
    const saved = localStorage.getItem(STORE_KEY + '-timer');
    timerSeconds = saved ? parseInt(saved) : 0;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
      if (timerSeconds % 30 === 0) localStorage.setItem(STORE_KEY + '-timer', timerSeconds);
    }, 1000);
  }
  function stopTimer() {
    clearInterval(timerInterval);
    localStorage.setItem(STORE_KEY + '-timer', timerSeconds);
  }
  function updateTimerDisplay() {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timer-display').textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }

  // --- Persistence ---
  function saveProgress() {
    const data = writerSections.map(s => s.text);
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
  }
  function loadProgress() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      saved.forEach((text, i) => {
        if (writerSections[i]) writerSections[i].text = text;
      });
    } catch(e) {}
  }
  function saveAllProgress() {
    const ta = document.getElementById('section-textarea');
    if (ta) writerSections[currentStep].text = ta.value;
    saveProgress();
    document.getElementById('autosave-status').textContent = 'Saved!';
    setTimeout(() => { document.getElementById('autosave-status').textContent = 'Auto-saved just now'; }, 2000);
  }
  function clearAllProgress() {
    if (!confirm('This will erase all your writing progress. Are you sure?')) return;
    localStorage.removeItem(STORE_KEY);
    localStorage.removeItem(STORE_KEY + '-timer');
    writerSections.forEach(s => s.text = '');
    timerSeconds = 0;
    currentStep = 0;
    buildSidebar();
    buildWriterContent(0);
    updateWriterProgress();
    updateTimerDisplay();
  }

  // --- Utilities ---
  function countWords(text) {
    return text.trim() ? text.trim().split(/\s+/).length : 0;
  }
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
