name: Morning Command Center Digest

on:
  schedule:
    # 8 AM Eastern (1 PM UTC) on weekdays
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'send'
        type: choice
        options:
          - send
          - dry-run

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  morning-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts/morning-digest
        run: npm install

      - name: Run Morning Digest
        working-directory: scripts/morning-digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT || 'leonardo.dinic@praetorian.com' }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "dry-run" ]; then
            node run-digest.js --dry-run
          else
            node run-digest.js
          fi

      - name: Deploy dashboard to GitHub Pages
        if: success()
        run: |
          mkdir -p pages
          cp scripts/morning-digest/dashboard.html pages/index.html
          cp scripts/morning-digest/dashboard.html pages/dashboard.html

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/deploy-pages@v4

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-digest-preview
          path: |
            scripts/morning-digest/preview.html
            scripts/morning-digest/dashboard.html
          retention-days: 7
